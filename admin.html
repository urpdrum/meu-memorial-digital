<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Botão</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-md mx-auto bg-white p-8 rounded shadow">
        <h1 class="mb-4 font-bold text-xl text-blue-600">Teste do Sistema</h1>
        
        <input type="text" id="inputNome" placeholder="Digite um nome" class="w-full p-2 border mb-4">
        
        <button onclick="salvarNoBanco()" id="btnCriar" class="w-full bg-blue-500 text-white p-4 rounded font-bold">
            TESTAR BOTÃO
        </button>
        
        <p id="mensagem" class="mt-4 text-green-600 font-bold"></p>
    </div>

    <script>
        console.log("O script carregou com sucesso!");

        function salvarNoBanco() {
            console.log("O botão foi clicado!");
            const nome = document.getElementById('inputNome').value;
            
            if(!nome) {
                alert("O botão está funcionando! Mas digite um nome primeiro.");
                return;
            }

            document.getElementById('mensagem').innerText = "Sucesso! O botão funcionou para: " + nome;
            alert("Parabéns! O código está rodando. Agora podemos colocar o Supabase.");
        }
    </script>
</body>
</html>
