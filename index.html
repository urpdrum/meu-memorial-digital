<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorial Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 font-sans text-stone-800">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl pb-10">
        <!-- Imagem -->
        <img id="foto" src="" class="w-full h-72 object-cover bg-gray-200">

        <div class="p-8 text-center">
            <!-- Os IDs (id="...") são como "endereços" para o JavaScript preencher -->
            <h1 id="nome" class="text-3xl font-serif font-bold italic text-stone-900">Carregando...</h1>
            <p id="datas" class="text-stone-500 mt-2 italic font-light text-lg"></p>
            
            <div class="my-8 border-y border-stone-200 py-6 px-4">
                <p id="biografia" class="italic leading-relaxed text-stone-600"></p>
            </div>

            <p class="text-xs uppercase tracking-[0.2em] text-stone-400 font-bold mb-6">Galeria</p>
            <div class="grid grid-cols-2 gap-3">
                <div class="aspect-square bg-stone-100 rounded"></div>
                <div class="aspect-square bg-stone-100 rounded"></div>
            </div>
        </div>
    </div>

    <!-- AQUI COMEÇA A MÁGICA: O BANCO DE DADOS SIMULADO -->
    <script>
        // Imagine que estes dados vieram de um formulário que o cliente preencheu
        const dadosDoMemorial = {
            nome: "Zico da Silva",
            nascimento: "10/02/1940",
            falecimento: "15/12/2023",
            biografia: "Um avô brincalhão que amava pescar e contar histórias para os netos. Sua alegria era o tempero das nossas reuniões de domingo.",
            fotoUrl: "https://images.unsplash.com/photo-1544144485-391f279d2412?w=500"
        };

        // Aqui o código coloca os dados nos lugares certos automaticamente
        document.getElementById('nome').innerText = dadosDoMemorial.nome;
        document.getElementById('datas').innerText = dadosDoMemorial.nascimento + " — " + dadosDoMemorial.falecimento;
        document.getElementById('biografia').innerText = '"' + dadosDoMemorial.biografia + '"';
        document.getElementById('foto').src = dadosDoMemorial.fotoUrl;
    </script>

</body>
</html>
