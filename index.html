<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorial Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 font-sans text-stone-800">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl pb-10">
        <img id="foto" src="https://images.unsplash.com/photo-1511227498332-9ef815939ca1?w=500" class="w-full h-72 object-cover">
        <div class="p-8 text-center">
            <h1 id="nome" class="text-3xl font-serif font-bold">Carregando...</h1>
            <p id="datas" class="text-stone-500 mt-2 italic"></p>
            <div class="my-8 border-y border-stone-200 py-6 px-4">
                <p id="biografia" class="italic leading-relaxed text-stone-600"></p>
            </div>
        </div>
    </div>

    <script>
        // ESSA É A MÁGICA: Ele pega os dados da URL (do link)
        const urlParams = new URLSearchParams(window.location.search);
        
        const nome = urlParams.get('nome') || "Nome não preenchido";
        const nascimento = urlParams.get('nasc') || "00/00/0000";
        const falecimento = urlParams.get('falec') || "00/00/0000";
        const bio = urlParams.get('bio') || "Nenhuma biografia informada.";

        // Coloca os dados na página
        document.getElementById('nome').innerText = nome;
        document.getElementById('datas').innerText = nascimento + " — " + falecimento;
        document.getElementById('biografia').innerText = '"' + bio + '"';
    </script>
</body>
</html>
