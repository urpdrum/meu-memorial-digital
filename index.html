<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorial Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-stone-100 font-sans text-stone-800">
    <div id="carregando" class="flex items-center justify-center h-screen">Buscando memórias...</div>
    
    <div id="conteudo" class="max-w-md mx-auto bg-white min-h-screen shadow-xl pb-10 hidden">
        <img id="fotoPrincipal" src="" class="w-full h-80 object-cover shadow-md">
        <div class="p-8 text-center">
            <h1 id="nome" class="text-3xl font-serif font-bold text-stone-900 uppercase"></h1>
            <p id="datas" class="text-stone-400 mt-2 italic font-light text-lg"></p>
            <div class="my-8 border-y border-stone-100 py-8 px-4 bg-stone-50/50 rounded-lg">
                <p id="biografia" class="italic leading-relaxed text-stone-600 text-lg"></p>
            </div>
            <p class="text-[10px] uppercase tracking-[0.5em] text-stone-400 font-bold opacity-30">Memória Eterna</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jfurmgguijnfnuttxusq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmdXJtZ2d1aWpuZm51dHR4dXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTIyNTcsImV4cCI6MjA5MTA4ODI1N30.pKHK5WVzdc0ctby8nVUGR_gdt3jTEwMqgsBX8e_1cNw';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarMemorial() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id) {
                const { data, error } = await supabase
                    .from('memorials')
                    .select('*')
                    .eq('id', id)
                    .single();

                if (data) {
                    document.getElementById('nome').innerText = data.nome;
                    document.getElementById('datas').innerText = data.nascimento + " — " + data.falecimento;
                    document.getElementById('biografia').innerText = '"' + data.biografia + '"';
                    document.getElementById('fotoPrincipal').src = data.foto_url || "https://images.unsplash.com/photo-1511227498332-9ef815939ca1?w=500";
                    
                    document.getElementById('carregando').classList.add('hidden');
                    document.getElementById('conteudo').classList.remove('hidden');
                }
            }
        }
        carregarMemorial();
    </script>
</body>
</html>
