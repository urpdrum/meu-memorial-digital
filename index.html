<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorial Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 font-sans text-stone-800">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-xl pb-10">
        
        <!-- Foto com "Plano B": se o link falhar, ele carrega uma imagem padrão -->
        <img id="fotoPrincipal" 
             src="https://images.unsplash.com/photo-1511227498332-9ef815939ca1?w=500" 
             onerror="this.src='https://images.unsplash.com/photo-1501290830384-9cbb24d216e5?w=500'"
             class="w-full h-80 object-cover shadow-md">
        
        <div class="p-8 text-center">
            <h1 id="nome" class="text-3xl font-serif font-bold text-stone-900 uppercase tracking-tight">Carregando...</h1>
            <p id="datas" class="text-stone-400 mt-2 italic font-light text-lg"></p>
            
            <div class="my-8 border-y border-stone-100 py-8 px-4 bg-stone-50/50 rounded-lg">
                <p id="biografia" class="italic leading-relaxed text-stone-600 text-lg"></p>
            </div>

            <div class="mt-10 opacity-30">
                <p class="text-[10px] uppercase tracking-[0.5em] text-stone-400 font-bold mb-4 italic">Memória Eterna</p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const nome = urlParams.get('nome') || "Nome do Homenageado";
        const nasc = urlParams.get('nasc') || "00/00/0000";
        const falec = urlParams.get('falec') || "00/00/0000";
        const bio = urlParams.get('bio') || "A história desta vida será contada aqui...";
        const foto = urlParams.get('foto');

        document.getElementById('nome').innerText = nome;
        document.getElementById('datas').innerText = nasc + " — " + falec;
        document.getElementById('biografia').innerText = '"' + bio + '"';
        
        // Só tenta trocar a foto se o link não estiver vazio
        if (foto && foto.trim() !== "") {
            document.getElementById('fotoPrincipal').src = foto;
        }
    </script>
</body>
</html>
